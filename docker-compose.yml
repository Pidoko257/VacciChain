services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vaccichain
    deploy:
      resources:
        limits:
          # Static React build served by nginx — minimal runtime footprint
          cpus: "0.25"
          memory: 128M

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      - python-service
    networks:
      - vaccichain
    deploy:
      resources:
        limits:
          # Node.js Express API + Stellar SDK calls; headroom for JWT/SEP-10 processing
          cpus: "0.75"
          memory: 512M

  python-service:
    build: ./python-service
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:4000
    networks:
      - vaccichain
    deploy:
      resources:
        limits:
          # FastAPI analytics; batch verification can be memory-intensive
          cpus: "0.50"
          memory: 256M

networks:
  vaccichain:
    driver: bridge
